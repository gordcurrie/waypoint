services:
  # influxdb:3-core runs as fixed non-root uid 1500 with no entrypoint chown,
  # so a fresh named volume (created root:root) fails catalog init on first run.
  influxdb-init-perms:
    image: influxdb:3-core
    user: root
    entrypoint: ["/bin/sh", "-c", "chown -R 1500:1500 /var/lib/influxdb3/data /var/lib/influxdb3/plugins"]
    volumes:
      - influxdb_data:/var/lib/influxdb3/data
      - influxdb_plugins:/var/lib/influxdb3/plugins
    restart: "no"

  influxdb:
    image: influxdb:3-core
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - influxdb_data:/var/lib/influxdb3/data
      - influxdb_plugins:/var/lib/influxdb3/plugins
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      - --http-bind=0.0.0.0:8181
      - --without-auth
    healthcheck:
      test: ["CMD-SHELL", "influxdb3 show databases --host http://localhost:8181 2>/dev/null | grep -qF -- '${INFLUXDB_BUCKET:-garmin}'"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s
    depends_on:
      influxdb-init-perms:
        condition: service_completed_successfully
    restart: unless-stopped

  influxdb-init:
    image: influxdb:3-core
    restart: "no"
    environment:
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-garmin}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until influxdb3 show databases --host http://influxdb:8181 2>/dev/null | grep -qF -- "$INFLUXDB_BUCKET"; do
          influxdb3 create database "$INFLUXDB_BUCKET" --host http://influxdb:8181 2>/dev/null || true
          sleep 1
        done
    depends_on:
      influxdb:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-garmin}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  sync:
    build: ./sync
    environment:
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
      GARMIN_MFA_CODE: ${GARMIN_MFA_CODE:-}
      INFLUXDB_URL: http://influxdb:8181
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_DATABASE: ${INFLUXDB_BUCKET:-garmin}
      SYNC_SCHEDULE: ${SYNC_SCHEDULE:-*/30 * * * *}
      BACKFILL_DAYS: ${BACKFILL_DAYS:-90}
    volumes:
      - sync_data:/data
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb_data:
  influxdb_plugins:
  grafana_data:
  sync_data:
  sync_data:
