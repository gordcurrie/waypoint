# MCP server as HTTP service — for local testing with HTTP transport.
# For homelab deployment, use docker-compose.homelab.yml instead (includes this).
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.mcp.yml up -d --build
#
# Claude config:
#   { "waypoint": { "type": "http", "url": "http://localhost:8080/mcp" } }

services:
  mcp-server:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      INFLUXDB_URL: http://influxdb:8181
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      # INFLUXDB_DATABASE accepts INFLUXDB_DATABASE first, falls back to INFLUXDB_BUCKET
      INFLUXDB_DATABASE: ${INFLUXDB_DATABASE:-${INFLUXDB_BUCKET:-garmin}}
    command: ["--transport=http", "--addr=0.0.0.0:8080"]
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
